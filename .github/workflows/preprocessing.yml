name: Automated Data Preprocessing

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Mengambil kode dari repositori
      uses: actions/checkout@v3

    - name: 2. Menyiapkan Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Menginstal Library
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: 4. Menjalankan Script Preprocessing
      # PENTING: Ganti automate_Mu_tashimah Asshof.py dengan nama file asli milikmu!
      run: |
        python preprocessing/automate_Mu_tashimah Asshof.py

    - name: 5. Menyimpan Data Bersih ke Repositori
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add dataset_preprocessing/
        git commit -m "Auto-process data via GitHub Actions" || echo "Tidak ada perubahan data"
        git push
