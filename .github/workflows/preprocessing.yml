name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'wdbc_raw/**'
      - 'preprocessing/automate_*.py'
  workflow_dispatch:

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn

      - name: Execute Automation Script
        run: |
          python preprocessing/automate_*.py

      - name: Commit and Push Processed Data
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add preprocessing/wdbc_preprocessing/
          git commit -m "Auto-update preprocessed dataset" || echo "No changes to commit"
          git push